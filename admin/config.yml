backend:
  name: github
  repo: SergeyAld/rahoff-hotel
  branch: main
  base_url: https://rahoff-auth.valerievsergej.workers.dev
  auth_endpoint: /auth

media_folder: "gallery"
public_folder: "gallery"

collections:
  - name: "content"
    label: "Управление на цени"
    files:
      - name: "prices"
        label: "Цени"
        file: "data.json"
        fields:
          - {label: "Данни", name: "bg", widget: "object", fields: [{label: "Редове", name: "tableRows", widget: "list", fields: [{label: "Стая", name: "0", widget: "string"}]}]}
