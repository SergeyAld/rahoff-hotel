backend:
  name: github
  repo: SergeyAld/rahoff-hotel
  branch: main
  base_url: https://rahoff-auth.valerievsergej.workers.dev
  auth_endpoint: /auth

media_folder: "gallery"
public_folder: "gallery"

collections:
  - name: "content"
    label: "Управление на цени"
    files:
      - name: "prices"
        label: "Цени (Всички езици)"
        file: "data.json"
        fields:
          - label: "Български (BG)"
            name: "bg"
            widget: "object"
            fields:
              - label: "Списък с цени (BG)"
                name: "tableRows"
                widget: "list"
                fields:
                  - {label: "Тип стая", name: "0", widget: "string"}
                  - {label: "Период 1", name: "1", widget: "string"}
                  - {label: "Период 2", name: "2", widget: "string"}
                  - {label: "Нова Година", name: "3", widget: "string"}
                  - {label: "Лято", name: "4", widget: "string"}
          - label: "English (EN)"
            name: "en"
            widget: "object"
            fields:
              - label: "Price List (EN)"
                name: "tableRows"
                widget: "list"
                fields:
                  - {label: "Room Type", name: "0", widget: "string"}
                  - {label: "Period 1", name: "1", widget: "string"}
                  - {label: "Period 2", name: "2", widget: "string"}
                  - {label: "New Year", name: "3", widget: "string"}
                  - {label: "Summer", name: "4", widget: "string"}
