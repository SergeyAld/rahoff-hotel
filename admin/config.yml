backend:
  name: github
  repo: SergeyAld/rahoff-hotel
  branch: main
  base_url: https://rahoff-auth.valerievsergej.workers.dev
  auth_endpoint: /auth

media_folder: "gallery"
public_folder: "gallery"

collections:
  - name: "prices"
    label: "Цени"
    files:
      - name: "hotel_data"
        label: "Редактиране"
        file: "data.json"
        fields:
          - label: "Български"
            name: "bg"
            widget: "object"
            fields:
              - name: "tableRows"
                label: "Таблица"
                widget: "list"
                summary: "{{fields.0}}"
                fields:
                  - {label: "Стая", name: "0", widget: "string"}
                  - {label: "П1", name: "1", widget: "string"}
                  - {label: "П2", name: "2", widget: "string"}
                  - {label: "Нг", name: "3", widget: "string"}
                  - {label: "Лято", name: "4", widget: "string"}
          - label: "English"
            name: "en"
            widget: "object"
            fields:
              - name: "tableRows"
                label: "Table"
                widget: "list"
                fields:
                  - {label: "Room", name: "0", widget: "string"}
                  - {label: "P1", name: "1", widget: "string"}
                  - {label: "P2", name: "2", widget: "string"}
                  - {label: "NY", name: "3", widget: "string"}
                  - {label: "Summer", name: "4", widget: "string"}
